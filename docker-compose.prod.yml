# Production overrides for Dokploy
# Usage: docker compose -f docker-compose.app.yml -f docker-compose.prod.yml up

services:
  # Backend - Production settings
  backend:
    environment:
      # Production security settings
      FORCE_HTTPS: "true"
      SECURE_COOKIES: "true"
      SESSION_SECURE: "true"
      CORS_ORIGINS: "https://your-domain.com"
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped

  # Admin App - Production settings
  admin-app:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        APP_DIR: admin-app
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: /api
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # Client App - Production settings
  client-app:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        APP_DIR: client-app
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: /api
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # Specialist App - Production settings
  specialist-app:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        APP_DIR: specialist-app
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: /api
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # Nginx - Production reverse proxy
  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: unless-stopped

  # PostgreSQL - Production settings
  postgres:
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "1.0"
          memory: 1G
    restart: unless-stopped
