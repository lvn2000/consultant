version: '3.8'

# Docker Compose with Infisical integration
# Использует Infisical Agent для автоматической синхронизации секретов

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: consultant-postgres
    environment:
      POSTGRES_DB: consultant
      # Эти credentials берутся из Infisical через agent
      POSTGRES_USER: ${POSTGRES_USER:-consultant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-consultant_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consultant"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: consultant-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - backend

  # Infisical Agent для app-1
  infisical-agent-1:
    image: infisical/cli:latest
    container_name: infisical-agent-1
    command: >
      agent --token ${INFISICAL_TOKEN}
            --project-id ${INFISICAL_PROJECT_ID}
            --environment ${INFISICAL_ENVIRONMENT:-production}
            --exit-on-sync
    volumes:
      - secrets-1:/run/secrets
    networks:
      - backend
    restart: unless-stopped

  # Application Instance 1
  app-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consultant-app-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      infisical-agent-1:
        condition: service_completed_successfully
    environment:
      # Конфигурация для чтения из файлов (более безопасно)
      CONFIG_FROM_FILES: "true"
      JWT_SECRET_FILE: /run/secrets/JWT_SECRET
      DB_PASSWORD_FILE: /run/secrets/DB_PASSWORD
      DB_ENCRYPTION_KEY_FILE: /run/secrets/DB_ENCRYPTION_KEY
      SESSION_SECRET_FILE: /run/secrets/SESSION_SECRET
      REDIS_PASSWORD_FILE: /run/secrets/REDIS_PASSWORD
      
      # Non-secret конфигурация (можно оставить в env vars)
      SERVER_PORT: 8090
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: consultant
      DB_USER: consultant
      REDIS_HOST: redis
      REDIS_PORT: 6379
      
      # JWT configuration
      JWT_ISSUER: consultant-api
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 7
      
      # Security settings
      ACCOUNT_LOCK_DURATION_MINUTES: 15
      MAX_LOGIN_ATTEMPTS: 5
    ports:
      - "8081:8090"
    volumes:
      - secrets-1:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - backend
    restart: unless-stopped

  # Infisical Agent для app-2
  infisical-agent-2:
    image: infisical/cli:latest
    container_name: infisical-agent-2
    command: >
      agent --token ${INFISICAL_TOKEN}
            --project-id ${INFISICAL_PROJECT_ID}
            --environment ${INFISICAL_ENVIRONMENT:-production}
            --exit-on-sync
    volumes:
      - secrets-2:/run/secrets
    networks:
      - backend
    restart: unless-stopped

  # Application Instance 2
  app-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consultant-app-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      infisical-agent-2:
        condition: service_completed_successfully
    environment:
      CONFIG_FROM_FILES: "true"
      JWT_SECRET_FILE: /run/secrets/JWT_SECRET
      DB_PASSWORD_FILE: /run/secrets/DB_PASSWORD
      DB_ENCRYPTION_KEY_FILE: /run/secrets/DB_ENCRYPTION_KEY
      SESSION_SECRET_FILE: /run/secrets/SESSION_SECRET
      REDIS_PASSWORD_FILE: /run/secrets/REDIS_PASSWORD
      
      SERVER_PORT: 8090
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: consultant
      DB_USER: consultant
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: consultant-api
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 7
      ACCOUNT_LOCK_DURATION_MINUTES: 15
      MAX_LOGIN_ATTEMPTS: 5
    ports:
      - "8082:8090"
    volumes:
      - secrets-2:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - backend
    restart: unless-stopped

  # Infisical Agent для app-3
  infisical-agent-3:
    image: infisical/cli:latest
    container_name: infisical-agent-3
    command: >
      agent --token ${INFISICAL_TOKEN}
            --project-id ${INFISICAL_PROJECT_ID}
            --environment ${INFISICAL_ENVIRONMENT:-production}
            --exit-on-sync
    volumes:
      - secrets-3:/run/secrets
    networks:
      - backend
    restart: unless-stopped

  # Application Instance 3
  app-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consultant-app-3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      infisical-agent-3:
        condition: service_completed_successfully
    environment:
      CONFIG_FROM_FILES: "true"
      JWT_SECRET_FILE: /run/secrets/JWT_SECRET
      DB_PASSWORD_FILE: /run/secrets/DB_PASSWORD
      DB_ENCRYPTION_KEY_FILE: /run/secrets/DB_ENCRYPTION_KEY
      SESSION_SECRET_FILE: /run/secrets/SESSION_SECRET
      REDIS_PASSWORD_FILE: /run/secrets/REDIS_PASSWORD
      
      SERVER_PORT: 8090
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: consultant
      DB_USER: consultant
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ISSUER: consultant-api
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_DAYS: 7
      ACCOUNT_LOCK_DURATION_MINUTES: 15
      MAX_LOGIN_ATTEMPTS: 5
    ports:
      - "8083:8090"
    volumes:
      - secrets-3:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - backend
    restart: unless-stopped

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: consultant-nginx
    depends_on:
      - app-1
      - app-2
      - app-3
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  secrets-1:
    driver: local
  secrets-2:
    driver: local
  secrets-3:
    driver: local
