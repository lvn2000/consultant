name: Client App CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'client-app/**'
      - '.github/workflows/client-app-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'client-app/**'
      - '.github/workflows/client-app-ci.yml'

defaults:
  run:
    working-directory: client-app

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npx eslint -c .eslintrc.cjs .

      - name: Run type check
        run: npm run type-check
        continue-on-error: true

      - name: Run tests
        run: npm run test
        continue-on-error: true

      - name: Build application
        run: npm run build


