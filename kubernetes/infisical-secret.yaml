---
# Infisical Kubernetes Operator - InfisicalSecret Custom Resource
# Автоматически синхронизирует секреты из Infisical в Kubernetes Secret

apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: consultant-secrets
  namespace: consultant-backend
  labels:
    app: consultant-backend
    managed-by: infisical
spec:
  # Ссылка на Kubernetes Secret с Infisical service token
  authentication:
    serviceToken:
      secretsScope:
        envSlug: production # или staging/development
        secretsPath: / # root path всех секретов
      serviceTokenSecretReference:
        secretName: infisical-auth
        secretNamespace: consultant-backend

  # Managed Kubernetes Secret который будет создан/обновлен
  managedSecretReference:
    secretName: consultant-managed-secret
    secretNamespace: consultant-backend
    creationPolicy: Owner # Operator владеет Secret lifecycle

  # Опции синхронизации
  resyncInterval: 60 # секунды между re-sync (для auto-rotation)

---
# Authentication Secret - создается вручную перед применением InfisicalSecret
# kubectl create secret generic infisical-auth \
#   --from-literal=token='st.prod.xxxx.yyyy.zzzz' \
#   --namespace consultant-backend

apiVersion: v1
kind: Secret
metadata:
  name: infisical-auth
  namespace: consultant-backend
  labels:
    app: consultant-backend
type: Opaque
# data:
#   token: <base64-encoded-service-token>
# Создается вручную через kubectl create secret

---
# ConfigMap для non-secret конфигурации
apiVersion: v1
kind: ConfigMap
metadata:
  name: consultant-config
  namespace: consultant-backend
  labels:
    app: consultant-backend
data:
  # Database
  DB_HOST: "consultant-postgres.consultant-backend.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "consultant"
  DB_USER: "consultant"

  # Redis
  REDIS_HOST: "consultant-redis.consultant-backend.svc.cluster.local"
  REDIS_PORT: "6379"

  # Server
  SERVER_PORT: "8090"

  # JWT
  JWT_ISSUER: "consultant-api"
  JWT_ACCESS_TTL_MINUTES: "15"
  JWT_REFRESH_TTL_DAYS: "7"

  # Security
  ACCOUNT_LOCK_DURATION_MINUTES: "15"
  MAX_LOGIN_ATTEMPTS: "5"

  # Features
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "false"
  LOG_LEVEL: "INFO"

---
# Updated Deployment using Infisical-managed secrets
apiVersion: apps/v1
kind: Deployment
metadata:
  name: consultant-backend
  namespace: consultant-backend
  labels:
    app: consultant-backend
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: consultant-backend
  template:
    metadata:
      labels:
        app: consultant-backend
        version: v1
      annotations:
        # Restart pod on secret change (опционально, для immediate rotation)
        checksum/secret: '{{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}'
    spec:
      # Anti-affinity для распределения по нодам
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - consultant-backend
                topologyKey: kubernetes.io/hostname

      # Init container для проверки готовности секретов
      initContainers:
        - name: wait-for-secrets
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for secrets to be available..."
              until [ -f /run/secrets/JWT_SECRET ]; do
                echo "Secrets not ready, waiting..."
                sleep 2
              done
              echo "Secrets are ready!"
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true

      containers:
        - name: app
          image: consultant-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP

          # Environment variables из ConfigMap (non-sensitive)
          envFrom:
            - configMapRef:
                name: consultant-config

          # Secrets как environment variables
          env:
            # Option 1: Direct env vars (проще, но менее безопасно)
            # - name: JWT_SECRET
            #   valueFrom:
            #     secretKeyRef:
            #       name: consultant-managed-secret
            #       key: JWT_SECRET

            # Option 2: File paths (более безопасно, рекомендуется)
            - name: CONFIG_FROM_FILES
              value: "true"
            - name: JWT_SECRET_FILE
              value: /run/secrets/JWT_SECRET
            - name: DB_PASSWORD_FILE
              value: /run/secrets/DB_PASSWORD
            - name: DB_ENCRYPTION_KEY_FILE
              value: /run/secrets/DB_ENCRYPTION_KEY
            - name: SESSION_SECRET_FILE
              value: /run/secrets/SESSION_SECRET
            - name: REDIS_PASSWORD_FILE
              value: /run/secrets/REDIS_PASSWORD

          # Volume mounts для секретов
          volumeMounts:
            - name: secrets
              mountPath: /run/secrets
              readOnly: true

          # Resource limits
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2

          # Security context
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

      # Volumes
      volumes:
        - name: secrets
          secret:
            secretName: consultant-managed-secret
            defaultMode: 0400 # read-only для owner
            optional: false

---
# Service для внутреннего доступа
apiVersion: v1
kind: Service
metadata:
  name: consultant-backend
  namespace: consultant-backend
  labels:
    app: consultant-backend
spec:
  type: ClusterIP
  selector:
    app: consultant-backend
  ports:
    - port: 8090
      targetPort: 8090
      protocol: TCP
      name: http

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: consultant-backend
  namespace: consultant-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: consultant-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
