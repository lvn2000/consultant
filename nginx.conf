events {
    worker_connections 4096;
}

http {
    upstream consultant_backend {
        # Least connections load balancing
        least_conn;
        
        server app-1:8080 max_fails=3 fail_timeout=30s;
        server app-2:8080 max_fails=3 fail_timeout=30s;
        server app-3:8080 max_fails=3 fail_timeout=30s;
    }

    # Кеширование
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    server {
        listen 80;
        server_name localhost;

        # Compression
        gzip on;
        gzip_types application/json text/plain;
        gzip_min_length 1000;

        # Rate limiting
        limit_req zone=api_limit burst=200 nodelay;
        limit_conn addr 10;

        # Health check endpoint
        location /health {
            proxy_pass http://consultant_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API endpoints
        location /api/ {
            proxy_pass http://consultant_backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Keep-alive
            proxy_set_header Connection "";
            
            # Caching для GET запросов
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_methods GET HEAD;
            proxy_cache_bypass $http_pragma $http_authorization;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Swagger UI
        location /docs/ {
            proxy_pass http://consultant_backend/docs/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Metrics endpoint (защитить в production!)
        location /metrics {
            proxy_pass http://consultant_backend/metrics;
            proxy_http_version 1.1;
            # allow 10.0.0.0/8;  # Только внутренняя сеть
            # deny all;
        }
    }
}
