events {
    worker_connections 4096;
}

http {
    upstream consultant_backend {
        # Least connections load balancing
        least_conn;
        
        server app-1:8090 max_fails=3 fail_timeout=30s;
        server app-2:8090 max_fails=3 fail_timeout=30s;
        server app-3:8090 max_fails=3 fail_timeout=30s;
    }

    # Caching
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # HTTP → HTTPS redirect
    # Note: In local development with docker-compose port mapping (9080:80, 9443:443),
    # the redirect target should account for mapped ports or use a header-based approach.
    # Current setup redirects to standard HTTPS port; adjust if using non-standard ports.
    server {
        listen 80;
        server_name localhost ~^.*$;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl http2;
        server_name localhost;

        # SSL Certificates
        ssl_certificate /etc/nginx/certs/certificate.crt;
        ssl_certificate_key /etc/nginx/certs/private.key;

        # SSL/TLS Configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # Security Headers
        # Note: HSTS without includeSubDomains/preload is safe for local development
        # In production with a real domain, add: includeSubDomains; preload
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Compression
        gzip on;
        gzip_types application/json text/plain;
        gzip_min_length 1000;
        gzip_vary on;

        # Rate limiting
        limit_req zone=api_limit burst=200 nodelay;
        limit_conn addr 10;

        # Health check endpoint
        location /health {
            proxy_pass http://consultant_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # API endpoints
        location /api/ {
            proxy_pass http://consultant_backend;
            proxy_http_version 1.1;
            
            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            
            # Keep-alive
            proxy_set_header Connection "";
            
            # Caching for GET requests
            proxy_cache api_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_methods GET HEAD;
            proxy_cache_bypass $http_pragma $http_authorization;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Swagger UI
        location /docs/ {
            proxy_pass http://consultant_backend/docs/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Metrics endpoint (restrict access in production)
        location /metrics {
            proxy_pass http://consultant_backend/metrics;
            proxy_http_version 1.1;
            # allow 10.0.0.0/8;  # Internal network only
            # deny all;
        }
    }
}
