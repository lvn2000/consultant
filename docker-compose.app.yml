# Base Docker Compose configuration
# Used for both development and production
# Override with docker-compose.dev.yml or docker-compose.prod.yml

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: consultant-postgres
    environment:
      POSTGRES_DB: consultant
      POSTGRES_USER: consultant_user
      POSTGRES_PASSWORD: consultant_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consultant_user -d consultant"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - consultant-network

  # Backend API (Scala/Http4s)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: consultant-backend
    environment:
      # Database
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: consultant
      DB_USER: consultant_user
      DB_PASSWORD: consultant_pass
      DB_ENCRYPTION_KEY: ${DB_ENCRYPTION_KEY:-dev-encryption-key-change-in-prod}
      # Server
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8090
      # Security
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production-minimum-64-characters-long}
      JWT_ISSUER: consultant-api
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 7d
      SESSION_SECRET: ${SESSION_SECRET:-dev-session-secret}
      MAX_LOGIN_ATTEMPTS: 5
      ACCOUNT_LOCK_DURATION_MINUTES: 15
      FORCE_HTTPS: "false"
      SECURE_COOKIES: "false"
      SESSION_SECURE: "false"
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - consultant-network

  # Admin App (Nuxt.js)
  admin-app:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        APP_DIR: admin-app
    container_name: consultant-admin-app
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: http://backend:8090/api
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    depends_on:
      - backend
    networks:
      - consultant-network

  # Client App (Nuxt.js)
  client-app:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        APP_DIR: client-app
    container_name: consultant-client-app
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: http://backend:8090/api
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    depends_on:
      - backend
    networks:
      - consultant-network

  # Specialist App (Nuxt.js)
  specialist-app:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        APP_DIR: specialist-app
    container_name: consultant-specialist-app
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: http://backend:8090/api
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 3000
    depends_on:
      - backend
    networks:
      - consultant-network

  # Nginx Reverse Proxy (optional - for production only)
  nginx:
    image: nginx:alpine
    container_name: consultant-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - admin-app
      - client-app
      - specialist-app
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - consultant-network
    profiles:
      - production # Only start with --profile production flag

networks:
  consultant-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
